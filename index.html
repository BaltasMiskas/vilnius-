<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orai ir Stilius | Vilnius</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --text-muted: #737373;
            --accent-color: #a16207;
            --border-color: #e5e5e5;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 40px 24px;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 48px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin: 0 0 8px 0;
            text-transform: uppercase;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        .input-group {
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px 16px;
            font-family: var(--font-family);
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 0;
            background-color: transparent;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="date"]:focus {
            border-color: var(--text-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            font-family: var(--font-family);
            font-size: 14px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-box {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .weather-info {
            font-size: 15px;
            margin-bottom: 24px;
            color: var(--text-color);
        }

        .weather-temp {
            font-size: 32px;
            font-weight: 300;
            color: var(--text-color);
            margin-bottom: 4px;
        }

        .recommendation-card {
            border: 1px solid var(--border-color);
            padding: 24px;
            margin-top: 16px;
            text-align: left;
        }

        .category-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        .item-title {
            font-size: 18px;
            font-weight: 400;
            margin: 0 0 12px 0;
        }

        .item-description {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .shop-link {
            display: inline-block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 2px;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .shop-link:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .loader {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            display: none;
            margin-top: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Orai &amp; Asortimentas</h1>
        <p class="subtitle">Vilniaus orų prognozė ir tikslinės dizainerių drabužių rekomendacijos</p>
    </header>

    <div class="input-group">
        <label for="date-input">Pasirinkite datą</label>
        <input type="date" id="date-input">
    </div>

    <button onclick="checkWeatherAndRecommend()">Ieškoti derinio</button>

    <div id="loader" class="loader">Analizuojami orų duomenys...</div>

    <div id="result" class="result-box">
        <div class="weather-info">
            <div id="weather-temp" class="weather-temp">--°C</div>
            <div id="weather-desc" style="color: var(--text-muted); font-size: 14px;"></div>
        </div>

        <div class="recommendation-card">
            <span id="rec-category" class="category-tag">Kolekcija</span>
            <h3 id="rec-title" class="item-title">Drabužis</h3>
            <p id="rec-desc" class="item-description">Aprašymas</p>
            <a id="rec-link" href="#" target="_blank" class="shop-link">Peržiūrėti baltasmiskas.lt</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('date-input').valueAsDate = new Date();

    const LAT = 54.6872;
    const LON = 25.2797;

    const vilniusClimate = {
        0: -3,  1: -2,  2: 2,   3: 9,   4: 15,  5: 19,
        6: 21,  7: 20,  8: 14,  9: 8,   10: 3,  11: -1
    };

    const microAssortment = {
        hot: { 
            even: {
                category: "Lino kolekcija",
                title: "Laisvo kirpimo lino suknelė",
                desc: "Karštai dienai mieste – lengva, neįpareigojanti lino suknelė. Natūralus audinys leidžia odai kvėpuoti ir palaiko gaivą.",
                url: "https://www.baltasmiskas.lt/sukneles"
            },
            odd: {
                category: "Lino Dienoraščiai",
                title: "Premium lino marškiniai ir šortai",
                desc: "Stilingas vasaros minimalizmas. Vėsus, kokybiškas linas puikiai tinka tiek poilsiui, tiek susitikimams mieste.",
                url: "https://www.baltasmiskas.lt/marskiniai-bliuzones"
            }
        },
        warm: { 
            even: {
                category: "Vasaros kostiumai",
                title: "Lengvas medvilninis švarkas arba suknelė",
                desc: "Subalansuotas pasirinkimas idealiam vasaros orui, kai norisi elegantiško silueto, bet išlaikant visišką komfortą.",
                url: "https://www.baltasmiskas.lt/svarkai"
            },
            odd: {
                category: "Laisvalaikio stilius",
                title: "Plazdantis vidutinio ilgio sijonas",
                desc: "Puikiai tinka šiltiems pasivaikščiojimams Vilniaus gatvėmis. Lengvai derinamas su minimalistiniais marškinėliais.",
                url: "https://www.baltasmiskas.lt/sijonai"
            }
        },
        mild: { 
            even: {
                category: "Kapsulinė spinta",
                title: "Struktūrizuotas Oversized švarkas",
                desc: "Puikus lietuvių dizainerių kirpimas pereinamajam sezonui. Suteikia įvaizdžiui griežtumo ir apsaugo nuo gaivaus vėjo.",
                url: "https://www.baltasmiskas.lt/svarkai"
            },
            odd: {
                category: "Miesto klasika",
                title: "Lengvas medvilninis džemperis ar kardiganas",
                desc: "Minkštas sluoksniavimo elementas, idealiai tinkantis vėsesniam vasaros vakarui ar ramiam pavasario vidurdieniui.",
                url: "https://www.baltasmiskas.lt/megzti-kostiumeliai"
            }
        },
        cool: { 
            even: {
                category: "Megzti kostiumėliai",
                title: "Plonos merino vilnos megztinis",
                desc: "Plonas, tačiau itin šiltas natūraluas pluošto mezginys, idealiai subalansuotas permainingiems pavasario orams.",
                url: "https://www.baltasmiskas.lt/megzti-kostiumeliai"
            },
            odd: {
                category: "Rudens/Pavasario akcentai",
                title: "Storo audinio marškinių tipo striukė",
                desc: "Universalus viršutinis drabužis, sukuriantis modernų miesto įvaizdį ir suteikiantis reikiamo jaukumo.",
                url: "https://www.baltasmiskas.lt/marskiniai-bliuzones"
            }
        },
        chilly: { 
            even: {
                category: "Merino Vilna",
                title: "Merino vilnos kelnių ir megztinio kostiumas",
                desc: "Visiškas jaukumo ir elegancijos balansas vėsioms dienoms. Natūrali vilna saugo šilumą ir nevaržo judesių.",
                url: "https://www.baltasmiskas.lt/megzti-kostiumeliai"
            },
            odd: {
                category: "Aksesuarai",
                title: "Platus vilnos šalikas ir stilinga kepurė",
                desc: "Kai aprangai trūksta paskutinio šilto akcento – rinkitės išskirtinės kokybės lietuvių kūrėjų šalikus.",
                url: "https://www.baltasmiskas.lt/priedai-aksesuarai"
            }
        },
        cold: { 
            even: {
                category: "Žiemos jaukumas",
                title: "Storas, stambaus mezgimo vilnos megztinis",
                desc: "Maksimali apsauga nuo šalto Vilniaus vėjo. Stambus, kokybiškas mezgimas garantuoja nepriekaištingą šilumą.",
                url: "https://www.baltasmiskas.lt/megzti-kostiumeliai"
            },
            odd: {
                category: "Šilti aksesuarai",
                title: "Minkštos vilnos pirštinės ir kepurių rinkinys",
                desc: "Šaltuoju sezonu nepakeičiami aksesuarai iš natūralių audinių, saugantys nuo žvarbaus lietuviško oro.",
                url: "https://www.baltasmiskas.lt/priedai-aksesuarai"
            }
        }
    };

    async function checkWeatherAndRecommend() {
        const dateInput = document.getElementById('date-input').value;
        if (!dateInput) return;

        const targetDate = new Date(dateInput);
        const today = new Date();
        
        today.setHours(0,0,0,0);
        targetDate.setHours(0,0,0,0);

        const diffTime = targetDate - today;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        
        const isEvenDay = targetDate.getDate() % 2 === 0;
        const dayType = isEvenDay ? 'even' : 'odd';

        document.getElementById('loader').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        let temperature;
        let isForecast = false;

        // Expanded window to 16 days via the Open-Meteo extended parameters
        if (diffDays >= 0 && diffDays <= 15) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max&forecast_days=16&timezone=auto`);
                const data = await response.json();
                if(data && data.daily && data.daily.temperature_2m_max && data.daily.temperature_2m_max[diffDays] !== null) {
                    temperature = Math.round(data.daily.temperature_2m_max[diffDays]);
                    isForecast = true;
                }
            } catch (error) {
                console.error("API error, switching to simulation baseline", error);
            }
        }

        // Ultimate Fallback: For historical dates or deep future dates
        if (temperature === undefined) {
            const month = targetDate.getMonth();
            const dayIdx = targetDate.getDate();
            const baseTemp = vilniusClimate[month];
            
            const fluctuation = Math.sin(dayIdx * 1.5) * 7; 
            temperature = Math.round(baseTemp + fluctuation);
        }

        displayResults(temperature, isForecast, targetDate, dayType);
    }

    function displayResults(temp, isForecast, dateObj, dayType) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('result').style.display = 'block';

        document.getElementById('weather-temp').innerText = `${temp}°C`;
        
        const dateString = dateObj.toLocaleDateString('lt-LT', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('weather-desc').innerText = isForecast 
            ? `Tikra 16 dienų orų prognozė Vilniuje (${dateString})`
            : `Klimato modelio simuliacija Vilniuje (${dateString})`;

        let weatherBracket = 'cold';
        if (temp > 22) weatherBracket = 'hot';
        else if (temp > 18) weatherBracket = 'warm';
        else if (temp > 14) weatherBracket = 'mild';
        else if (temp > 9) weatherBracket = 'cool';
        else if (temp > 4) weatherBracket = 'chilly';

        const match = microAssortment[weatherBracket][dayType];

        if (match) {
            document.getElementById('rec-category').innerText = match.category;
            document.getElementById('rec-title').innerText = match.title;
            document.getElementById('rec-desc').innerText = match.desc;
            document.getElementById('rec-link').href = match.url;
        }
    }
</script>

</body>
</html>
