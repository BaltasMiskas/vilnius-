<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orai ir Stilius | Vilnius</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --text-muted: #737373;
            --accent-color: #a16207; /* Warm gold accent */
            --border-color: #e5e5e5;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 40px 24px;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 48px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin: 0 0 8px 0;
            text-transform: uppercase;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        .input-group {
            margin-bottom: 32px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px 16px;
            font-family: var(--font-family);
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 0;
            background-color: transparent;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input[type="date"]:focus {
            border-color: var(--text-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            font-family: var(--font-family);
            font-size: 14px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-box {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
            display: none;
        }

        .weather-info {
            font-size: 15px;
            margin-bottom: 24px;
            color: var(--text-color);
        }

        .weather-temp {
            font-size: 32px;
            font-weight: 300;
            color: var(--text-color);
            margin-bottom: 4px;
        }

        .recommendation-card {
            border: 1px solid var(--border-color);
            padding: 24px;
            margin-top: 16px;
            text-align: left;
        }

        .category-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 6px;
            display: block;
        }

        .item-title {
            font-size: 18px;
            font-weight: 400;
            margin: 0 0 12px 0;
        }

        .item-description {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .shop-link {
            display: inline-block;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 2px;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .shop-link:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        .loader {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            display: none;
            margin-top: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Orai &amp; Asortimentas</h1>
        <p class="subtitle">Vilniaus orų prognozė ir Baltas Miškas stiliaus rekomendacijos</p>
    </header>

    <div class="input-group">
        <label for="date-input">Pasirinkite datą</label>
        <input type="date" id="date-input">
    </div>

    <button onclick="checkWeatherAndRecommend()">Ieškoti derinio</button>

    <div id="loader" class="loader">Tikrinami orai Vilniuje...</div>

    <div id="result" class="result-box">
        <div class="weather-info">
            <div id="weather-temp" class="weather-temp">--°C</div>
            <div id="weather-desc" style="color: var(--text-muted); font-size: 14px;"></div>
        </div>

        <div class="recommendation-card">
            <span id="rec-category" class="category-tag">Rekomendacija</span>
            <h3 id="rec-title" class="item-title">Drabužio pavadinimas</h3>
            <p id="rec-desc" class="item-description">Aprašymas, kodėl šis pasirinkimas geriausiai tinka šiam orui.</p>
            <a id="rec-link" href="#" target="_blank" class="shop-link">Peržiūrėti kolekciją baltasmiskas.lt</a>
        </div>
    </div>
</div>

<script>
    // Set default date to today's date
    document.getElementById('date-input').valueAsDate = new Date();

    // Vilnius coordinate defaults
    const LAT = 54.6872;
    const LON = 25.2797;

    // Vilnius historical monthly average temperatures (in case date is out of forecast range)
    const vilniusClimate = {
        0: -4,  // Jan
        1: -3,  // Feb
        2: 1,   // Mar
        3: 8,   // Apr
        4: 14,  // May
        5: 17,  // Jun
        6: 19,  // Jul
        7: 18,  // Aug
        8: 13,  // Sep
        9: 7,   // Oct
        10: 2,  // Nov
        11: -2  // Dec
    };

    // Style Assortment Engine structured for slow fashion / natural textiles
    const assortmentMatrix = [
        {
            minTemp: 22,
            maxTemp: 100,
            category: "Lino Dienoraščiai",
            title: "Balinto Lino Suknelė arba Marškiniai",
            desc: "Karštoms vasaros dienoms Vilniaus gatvėse idealiai tinka natūralus, lengvas linas. Jis pasižymi puikiu pralaidumu orui bei natūralia apsauga nuo saulės spindulių.",
            url: "https://www.baltasmiskas.lt/sukneles"
        },
        {
            minTemp: 15,
            maxTemp: 22,
            category: "Vasaros Stilius",
            title: "Lengvas Sijonas arba Rafijos Akcentai",
            desc: "Šiltam, maloniam orui rinkitės plono audinio sijonus ar laisvas sukneles. Derinį puikiai papildys lengvas švarkelis vakarui.",
            url: "https://www.baltasmiskas.lt/sijonai"
        },
        {
            minTemp: 8,
            maxTemp: 15,
            category: "Švarkai & Kapsulė",
            title: "Struktūrizuotas Švarkas ar Pereinamojo Sezono Kostiumėlis",
            desc: "Tipiniam pavasario ar rudens orui Vilniuje geriausias pasirinkimas – lietuvių dizainerių kurti struktūrizuoti švarkai, suteikiantys elegancijos ir jaukios šilumos.",
            url: "https://www.baltasmiskas.lt/svarkai"
        },
        {
            minTemp: 0,
            maxTemp: 8,
            category: "Megzti Kostiumėliai",
            title: "Jaukus Merino Vilnos Megztinis ar Kostiumėlis",
            desc: "Vėsiomis dienomis komfortą užtikrina merino vilnos gaminiai. Jie palaiko optimalią kūno temperatūrą be papildomo drabužių svorio pojūčio.",
            url: "https://www.baltasmiskas.lt/megzti-kostiumeliai"
        },
        {
            minTemp: -100,
            maxTemp: 0,
            category: "Žiemos Jaukumas",
            title: "Šilti Retų Vilnų Mezginiai & Aksesuarai",
            desc: "Spaudžiant šaltukui, niekas neprilygsta storiems lietuvių kūrėjų mezginiams bei minkštiems kašmyro ar vilnos šalikams.",
            url: "https://www.baltasmiskas.lt/priedai-aksesuarai"
        }
    ];

    async function checkWeatherAndRecommend() {
        const dateInput = document.getElementById('date-input').value;
        if (!dateInput) return;

        const targetDate = new Date(dateInput);
        const today = new Date();
        
        // Reset times to compare dates easily
        today.setHours(0,0,0,0);
        targetDate.setHours(0,0,0,0);

        const diffTime = targetDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        document.getElementById('loader').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        let temperature;
        let isForecast = false;

        // Open-Meteo free tier offers forecast up to 7 days in advance
        if (diffDays >= 0 && diffDays <= 7) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=temperature_2m_max&timezone=auto`);
                const data = await response.json();
                temperature = Math.round(data.daily.temperature_2m_max[diffDays]);
                isForecast = true;
            } catch (error) {
                console.error("Nepavyko gauti tiesioginės prognozės, naudojami klimato vidurkiai.", error);
            }
        }

        // Fallback to historical monthly baseline if date is historical, distant, or API errors out
        if (temperature === undefined) {
            const month = targetDate.getMonth();
            temperature = vilniusClimate[month];
        }

        displayResults(temperature, isForecast, targetDate);
    }

    function displayResults(temp, isForecast, dateObj) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('result').style.display = 'block';

        // Update Weather details
        document.getElementById('weather-temp').innerText = `${temp}°C`;
        
        const dateString = dateObj.toLocaleDateString('lt-LT', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('weather-desc').innerText = isForecast 
            ? `Prognozuojama maksimali temperatūra Vilniuje (${dateString})`
            : `Vidutinė klimato temperatūra Vilniuje šiuo metų laiku (${dateString})`;

        // Evaluate core routing matrix
        const match = assortmentMatrix.find(item => temp >= item.minTemp && temp < item.maxTemp);

        if (match) {
            document.getElementById('rec-category').innerText = match.category;
            document.getElementById('rec-title').innerText = match.title;
            document.getElementById('rec-desc').innerText = match.desc;
            document.getElementById('rec-link').href = match.url;
        }
    }
</script>

</body>
</html>
